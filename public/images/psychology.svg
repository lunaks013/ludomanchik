<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#1a3050"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#c9a227" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#c9a227" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="brain" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="900" height="560" fill="url(#bg)"/>
  <rect width="900" height="560" fill="url(#glow)"/>

  <!-- Brain silhouette -->
  <g transform="translate(450,270)" filter="url(#shadow)">
    <!-- Left hemisphere -->
    <path d="M-10,-150 C-90,-150 -150,-90 -150,-10 C-150,50 -120,110 -60,140 C-30,155 10,155 10,100 L10,-150 Z" fill="url(#brain)" stroke="#334155" stroke-width="2"/>
    <!-- Right hemisphere -->
    <path d="M10,-150 C90,-150 150,-90 150,-10 C150,50 120,110 60,140 C30,155 -10,155 -10,100 L-10,-150 Z" fill="url(#brain)" stroke="#334155" stroke-width="2"/>

    <!-- Corpus callosum -->
    <line x1="0" y1="-130" x2="0" y2="130" stroke="#c9a227" stroke-width="2" opacity="0.35"/>

    <!-- Brain folds - left -->
    <path d="M-80,-80 Q-50,-100 -20,-80 Q10,-60 -50,-40" stroke="#475569" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M-100,-20 Q-60,-40 -30,-20 Q0,0 -60,20" stroke="#475569" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M-90,40 Q-50,20 -20,50 Q10,70 -50,80" stroke="#475569" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M-70,90 Q-40,70 -10,90" stroke="#475569" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Brain folds - right -->
    <path d="M80,-80 Q50,-100 20,-80 Q-10,-60 50,-40" stroke="#475569" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M100,-20 Q60,-40 30,-20 Q0,0 60,20" stroke="#475569" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M90,40 Q50,20 20,50 Q-10,70 50,80" stroke="#475569" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M70,90 Q40,70 10,90" stroke="#475569" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Dopamine burst (reward center) -->
  <circle cx="450" cy="210" r="20" fill="#c9a227" opacity="0.9"/>
  <circle cx="450" cy="210" r="35" fill="none" stroke="#c9a227" stroke-width="2" opacity="0.5"/>
  <circle cx="450" cy="210" r="55" fill="none" stroke="#c9a227" stroke-width="1.5" opacity="0.25"/>
  <circle cx="450" cy="210" r="75" fill="none" stroke="#c9a227" stroke-width="1" opacity="0.12"/>

  <!-- Spark rays -->
  <line x1="450" y1="130" x2="450" y2="155" stroke="#d4af37" stroke-width="2" opacity="0.6"/>
  <line x1="520" y1="160" x2="500" y2="175" stroke="#d4af37" stroke-width="2" opacity="0.5"/>
  <line x1="380" y1="160" x2="400" y2="175" stroke="#d4af37" stroke-width="2" opacity="0.5"/>

  <!-- ECG pulse (arousal) -->
  <path d="M120 320 L180 320 L200 270 L220 370 L240 300 L260 320 L320 320" stroke="#c9a227" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
  <path d="M580 320 L640 320 L660 270 L680 370 L700 300 L720 320 L780 320" stroke="#c9a227" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>

  <!-- Neural nodes -->
  <circle cx="200" cy="200" r="6" fill="#c9a227" opacity="0.4"/>
  <circle cx="700" cy="200" r="6" fill="#c9a227" opacity="0.4"/>
  <line x1="206" y1="200" x2="380" y2="210" stroke="#c9a227" stroke-width="1" opacity="0.2"/>
  <line x1="694" y1="200" x2="520" y2="210" stroke="#c9a227" stroke-width="1" opacity="0.2"/>

  <rect x="360" y="510" width="180" height="5" rx="2.5" fill="#c9a227" opacity="0.45"/>
</svg>
