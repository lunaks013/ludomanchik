<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#1a3050"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <path id="heart" d="M0,10 C0,-2 -14,-10 -14,2 C-14,12 0,24 0,32 C0,24 14,12 14,2 C14,-10 0,-2 0,10 Z" fill="#dc2626"/>
    <path id="spade" d="M0,-18 C-12,-6 -20,4 -12,14 C-6,20 0,16 0,26 C0,16 6,20 12,14 C20,4 12,-6 0,-18 Z M-5,26 L5,26 L4,34 L-4,34 Z" fill="#0f172a"/>
    <path id="diamond" d="M0,-22 L18,0 L0,22 L-18,0 Z" fill="#dc2626"/>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- ??????? -->
  <g transform="translate(240,230) rotate(-18)" filter="url(#sh)">
    <rect x="-60" y="-88" width="120" height="176" rx="12" fill="#1e3a5f" stroke="#334155" stroke-width="1.5"/>
    <rect x="-44" y="-72" width="88" height="144" rx="8" fill="#0f172a" stroke="#c9a227" stroke-width="2" opacity="0.45"/>
    <circle cx="0" cy="0" r="24" fill="none" stroke="#c9a227" stroke-width="2" opacity="0.3"/>
  </g>

  <!-- ??? ?????? -->
  <g transform="translate(380,235) rotate(-5)" filter="url(#sh)">
    <rect x="-60" y="-88" width="120" height="176" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <use href="#heart" transform="translate(0,-5) scale(2.8)"/>
    <use href="#heart" transform="translate(-36,-58) scale(1.1)"/>
    <use href="#heart" transform="translate(36,58) scale(1.1)"/>
  </g>

  <!-- ??? ??? -->
  <g transform="translate(540,225) rotate(10)" filter="url(#sh)">
    <rect x="-60" y="-88" width="120" height="176" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <use href="#spade" transform="translate(0,0) scale(2.5)"/>
    <use href="#spade" transform="translate(-36,-58) scale(1)"/>
    <use href="#spade" transform="translate(36,58) scale(1)"/>
  </g>
</svg>
