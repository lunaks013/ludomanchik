<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#1a3050"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>

  <g transform="translate(400,270)" filter="url(#sh)">
    <!-- Золотой обод -->
    <circle r="175" fill="#8b6914" stroke="#d4af37" stroke-width="7"/>
    <!-- 24 кармана -->
    <g>
      <g transform="rotate(0)"><rect x="-8" y="-168" width="16" height="38" rx="3" fill="#dc2626"/></g>
      <g transform="rotate(15)"><rect x="-8" y="-168" width="16" height="38" rx="3" fill="#1e293b"/></g>
      <g transform="rotate(30)"><rect x="-8" y="-168" width="16" height="38" rx="3" fill="#dc2626"/></g>
      <g transform="rotate(45)"><rect x="-8" y="-168" width="16" height="38" rx="3" fill="#1e293b"/></g>
      <g transform="rotate(60)"><rect x="-8" y="-168" width="16" height="38" rx="3" fill="#dc2626"/></g>
      <g transform="rotate(75)"><rect x="-8" y="-168" width="16" height="38" rx="3" fill="#1e293b"/></g>
      <g transform="rotate(90)"><rect x="-8" y="-168" width="16" height="38" rx="3" fill="#dc2626"/></g>
      <g transform="rotate(105)"><rect x="-8" y="-168" width="16" height="38" rx="3" fill="#1e293b"/></g>
      <g transform="rotate(120)"><rect x="-8" y="-168" width="16" height="38" rx="3" fill="#dc2626"/></g>
      <g transform="rotate(135)"><rect x="-8" y="-168" width="16" height="38" rx="3" fill="#1e293b"/></g>
      <g transform="rotate(150)"><rect x="-8" y="-168" width="16" height="38" rx="3" fill="#dc2626"/></g>
      <g transform="rotate(165)"><rect x="-8" y="-168" width="16" height="38" rx="3" fill="#1e293b"/></g>
      <g transform="rotate(180)"><rect x="-8" y="-168" width="16" height="38" rx="3" fill="#dc2626"/></g>
      <g transform="rotate(195)"><rect x="-8" y="-168" width="16" height="38" rx="3" fill="#1e293b"/></g>
      <g transform="rotate(210)"><rect x="-8" y="-168" width="16" height="38" rx="3" fill="#dc2626"/></g>
      <g transform="rotate(225)"><rect x="-8" y="-168" width="16" height="38" rx="3" fill="#1e293b"/></g>
      <g transform="rotate(240)"><rect x="-8" y="-168" width="16" height="38" rx="3" fill="#dc2626"/></g>
      <g transform="rotate(255)"><rect x="-8" y="-168" width="16" height="38" rx="3" fill="#1e293b"/></g>
      <g transform="rotate(270)"><rect x="-8" y="-168" width="16" height="38" rx="3" fill="#dc2626"/></g>
      <g transform="rotate(285)"><rect x="-8" y="-168" width="16" height="38" rx="3" fill="#1e293b"/></g>
      <g transform="rotate(300)"><rect x="-8" y="-168" width="16" height="38" rx="3" fill="#dc2626"/></g>
      <g transform="rotate(315)"><rect x="-8" y="-168" width="16" height="38" rx="3" fill="#1e293b"/></g>
      <g transform="rotate(330)"><rect x="-8" y="-168" width="16" height="38" rx="3" fill="#dc2626"/></g>
      <g transform="rotate(345)"><rect x="-8" y="-168" width="16" height="38" rx="3" fill="#1e293b"/></g>
    </g>
    <!-- Дорожка -->
    <circle r="125" fill="#0f172a" stroke="#475569" stroke-width="3"/>
    <!-- Шарик -->
    <circle cx="85" cy="-60" r="11" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <!-- Центр -->
    <circle r="55" fill="#d4af37" stroke="#fff" stroke-width="3"/>
    <circle r="18" fill="#0a1628"/>
  </g>

  <!-- Указатель -->
  <polygon points="400,48 384,92 416,92" fill="#d4af37" stroke="#fff" stroke-width="2"/>
