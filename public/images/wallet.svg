<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#1a3050"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#c9a227" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#c9a227" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="leather" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0bc42"/>
      <stop offset="50%" stop-color="#c9a227"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="900" height="400" fill="url(#bg)"/>
  <rect width="900" height="400" fill="url(#glow)"/>

  <g transform="translate(450,200)" filter="url(#shadow)">
    <!-- Wallet body -->
    <rect x="-240" y="-100" width="480" height="200" rx="28" fill="url(#leather)" stroke="#d4af37" stroke-width="2"/>
    <!-- Inner pocket -->
    <rect x="-220" y="-80" width="440" height="160" rx="20" fill="#0f172a"/>
    <!-- Flap -->
    <path d="M-220,-20 L220,-20 L220,-80 Q220,-100 200,-100 L-200,-100 Q-220,-100 -220,-80 Z" fill="#b08d1e"/>
    <line x1="-220" y1="-20" x2="220" y2="-20" stroke="#d4af37" stroke-width="1" opacity="0.4"/>

    <!-- Card slot -->
    <rect x="60" y="-10" width="150" height="90" rx="14" fill="#c9a227"/>
    <rect x="72" y="2" width="126" height="66" rx="10" fill="#0f172a"/>
    <circle cx="135" cy="35" r="20" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <circle cx="135" cy="35" r="10" fill="#d4af37" opacity="0.5"/>

    <!-- Plus icon (top-up) -->
    <circle cx="-80" cy="30" r="35" fill="none" stroke="#d4af37" stroke-width="3" opacity="0.5"/>
    <rect x="-95" y="27" width="30" height="6" rx="3" fill="#d4af37"/>
    <rect x="-83" y="15" width="6" height="30" rx="3" fill="#d4af37"/>

    <!-- Stitching -->
    <line x1="-200" y1="60" x2="200" y2="60" stroke="#d4af37" stroke-width="1" stroke-dasharray="6 4" opacity="0.3"/>
  </g>

  <!-- Falling coins -->
  <circle cx="340" cy="80" r="20" fill="#d4af37" stroke="#fff" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="380" cy="55" r="15" fill="#d4af37" stroke="#fff" stroke-width="2" opacity="0.8"/>
  <circle cx="420" cy="70" r="12" fill="#e0bc42" stroke="#fff" stroke-width="1.5" opacity="0.6"/>

  <!-- Motion lines -->
  <line x1="360" y1="110" x2="360" y2="130" stroke="#c9a227" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
  <line x1="400" y1="90" x2="400" y2="108" stroke="#c9a227" stroke-width="2" opacity="0.25" stroke-linecap="round"/>

  <rect x="360" y="365" width="180" height="5" rx="2.5" fill="#c9a227" opacity="0.45"/>
</svg>
