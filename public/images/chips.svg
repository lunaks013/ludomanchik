<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#1a3050"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a227" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#c9a227" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="900" height="400" fill="url(#bg)"/>
  <rect width="900" height="400" fill="url(#glow)"/>

  <!-- Gold chip -->
  <g transform="translate(250,200)" filter="url(#shadow)">
    <circle r="85" fill="#d4af37" stroke="#fff" stroke-width="5"/>
    <circle r="62" fill="none" stroke="#0a1628" stroke-width="3"/>
    <circle r="62" fill="none" stroke="#0a1628" stroke-width="2" stroke-dasharray="14 10"/>
    <rect x="-40" y="-7" width="80" height="14" rx="7" fill="#0a1628" opacity="0.25"/>
    <rect x="-7" y="-40" width="14" height="80" rx="7" fill="#0a1628" opacity="0.15"/>
    <!-- Edge notches -->
    <rect x="-4" y="-85" width="8" height="12" rx="2" fill="#fff" opacity="0.5"/>
    <rect x="-4" y="73" width="8" height="12" rx="2" fill="#fff" opacity="0.5"/>
    <rect x="-85" y="-4" width="12" height="8" rx="2" fill="#fff" opacity="0.5"/>
    <rect x="73" y="-4" width="12" height="8" rx="2" fill="#fff" opacity="0.5"/>
  </g>

  <!-- Red chip (slightly elevated) -->
  <g transform="translate(450,185)" filter="url(#shadow)">
    <circle r="85" fill="#dc2626" stroke="#fff" stroke-width="5"/>
    <circle r="62" fill="none" stroke="#fff" stroke-width="3"/>
    <circle r="62" fill="none" stroke="#fff" stroke-width="2" stroke-dasharray="14 10"/>
    <rect x="-40" y="-7" width="80" height="14" rx="7" fill="#fff" opacity="0.2"/>
    <rect x="-4" y="-85" width="8" height="12" rx="2" fill="#fff" opacity="0.5"/>
    <rect x="-4" y="73" width="8" height="12" rx="2" fill="#fff" opacity="0.5"/>
  </g>

  <!-- Navy chip -->
  <g transform="translate(650,200)" filter="url(#shadow)">
    <circle r="85" fill="#1e3a5f" stroke="#d4af37" stroke-width="5"/>
    <circle r="62" fill="none" stroke="#d4af37" stroke-width="3"/>
    <circle r="62" fill="none" stroke="#d4af37" stroke-width="2" stroke-dasharray="14 10"/>
    <rect x="-40" y="-7" width="80" height="14" rx="7" fill="#d4af37" opacity="0.2"/>
    <rect x="-4" y="-85" width="8" height="12" rx="2" fill="#d4af37" opacity="0.5"/>
    <rect x="-4" y="73" width="8" height="12" rx="2" fill="#d4af37" opacity="0.5"/>
  </g>

  <!-- Stack shadow on table -->
  <ellipse cx="450" cy="330" rx="280" ry="12" fill="#000" opacity="0.2"/>

  <rect x="360" y="365" width="180" height="5" rx="2.5" fill="#c9a227" opacity="0.45"/>
</svg>
