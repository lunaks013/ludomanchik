<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#1a3050"/>
    </linearGradient>
    <linearGradient id="die" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8ecf2"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- ????? 5 -->
  <g transform="translate(280,250)" filter="url(#sh)">
    <rect x="-85" y="-85" width="170" height="170" rx="24" fill="url(#die)" stroke="#94a3b8" stroke-width="2.5"/>
    <circle cx="-48" cy="-48" r="16" fill="#0f172a"/>
    <circle cx="48" cy="-48" r="16" fill="#0f172a"/>
    <circle cx="0" cy="0" r="16" fill="#0f172a"/>
    <circle cx="-48" cy="48" r="16" fill="#0f172a"/>
    <circle cx="48" cy="48" r="16" fill="#0f172a"/>
  </g>

  <!-- ????? 3 -->
  <g transform="translate(520,250)" filter="url(#sh)">
    <rect x="-85" y="-85" width="170" height="170" rx="24" fill="url(#die)" stroke="#94a3b8" stroke-width="2.5"/>
    <circle cx="-48" cy="-48" r="16" fill="#0f172a"/>
    <circle cx="0" cy="0" r="16" fill="#0f172a"/>
    <circle cx="48" cy="48" r="16" fill="#0f172a"/>
  </g>
</svg>
